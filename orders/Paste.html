<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product View</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff0f5;
    color: #333;
  }

  /* Main container */
  .product-container {
    text-align: center;
    margin-top: 300px;
  }

  /* Image styling */
  .product-image {
    width: 300px;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  .product-image.expanded {
    transform: scale(1.8);
    z-index: 10;
    position: relative;
  }

  /* Dropdown container */
  .options-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
  }

  /* Each dropdown */
  .dropdown {
    background: white;
    border-radius: 10px;
    width: 180px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  /* Dropdown header */
  .dropdown-header {
    background: hotpink;
    color: white;
    padding: 12px;
    font-weight: bold;
    cursor: pointer;
  }

  /* Dropdown content */
  .dropdown-content {
    display: none;
    padding: 10px;
  }

  .dropdown-content a {
    display: block;
    padding: 8px;
    margin: 5px 0;
    text-decoration: none;
    color: hotpink;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .dropdown-content a:hover {
    background: #ffe4ec;
  }

  .dropdown.open .dropdown-content {
    display: block;
  }

</style>
</head>

<body>

<div class="product-container">

  <!-- IMAGE -->
  <img id="product-image" class="product-image" src="cat1.jpg" alt="Product">

  <!-- OPTIONS -->
  <div class="options-row">

    <!-- PAINTINGS -->
    <div class="dropdown">
      <div class="dropdown-header">Paintings</div>
      <div class="dropdown-content">
        <a href="#" target="_blank">Canvas Print</a>
        <a href="#" target="_blank">Framed Art</a>
        <a href="#" target="_blank">Poster</a>
        <a href="#" target="_blank">Gallery Wrap</a>
        <a href="#" target="_blank">Mini Print</a>
      </div>
    </div>

    <!-- HOUSEWARE -->
    <div class="dropdown">
      <div class="dropdown-header">Houseware</div>
      <div class="dropdown-content">
        <a href="#" target="_blank">Mug</a>
        <a href="#" target="_blank">Pillow</a>
        <a href="#" target="_blank">Blanket</a>
        <a href="#" target="_blank">Wall Tapestry</a>
        <a href="#" target="_blank">Coasters</a>
      </div>
    </div>

    <!-- CLOTHING -->
    <div class="dropdown">
      <div class="dropdown-header">Clothing</div>
      <div class="dropdown-content">
        <a href="#" target="_blank">T-Shirt</a>
        <a href="#" target="_blank">Hoodie</a>
        <a href="#" target="_blank">Socks</a>
        <a href="#" target="_blank">Hat</a>
        <a href="#" target="_blank">Sweatpants</a>
      </div>
    </div>

  </div>
</div>

<script>

  // 🔍 Image expand toggle
  const image = document.getElementById("product-image");

  image.addEventListener("click", () => {
    image.classList.toggle("expanded");
  });

  // 📂 Dropdown toggle
  const dropdowns = document.querySelectorAll(".dropdown");

  dropdowns.forEach(drop => {
    drop.querySelector(".dropdown-header").addEventListener("click", () => {
      drop.classList.toggle("open");
    });
  });

  // 🚀 Example dynamic loader (hook this into your system)
  function loadProduct(product) {
    document.getElementById("product-image").src = product.image;

    // Example: dynamically set links
    const links = document.querySelectorAll(".dropdown-content a");

    // You would map these properly later
    links.forEach(link => {
      link.href = product.etsyLink || "#";
    });
  }

</script>

</body>
</html>
